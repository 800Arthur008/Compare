<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="100%" height="100%">
  <!-- Fundo branco limpo -->
  <rect width="150" height="150" fill="#ffffff" />
  
  <!-- Marcador de Posicionamento: Superior Esquerdo -->
  <rect x="10" y="10" width="40" height="40" rx="4" fill="#767043" />
  <rect x="18" y="18" width="24" height="24" rx="2" fill="#ffffff" />
  <rect x="23" y="23" width="14" height="14" rx="1" fill="#767043" />

  <!-- Marcador de Posicionamento: Superior Direito -->
  <rect x="100" y="10" width="40" height="40" rx="4" fill="#767043" />
  <rect x="108" y="18" width="24" height="24" rx="2" fill="#ffffff" />
  <rect x="113" y="23" width="14" height="14" rx="1" fill="#767043" />

  <!-- Marcador de Posicionamento: Inferior Esquerdo -->
  <rect x="10" y="100" width="40" height="40" rx="4" fill="#767043" />
  <rect x="18" y="108" width="24" height="24" rx="2" fill="#ffffff" />
  <rect x="23" y="113" width="14" height="14" rx="1" fill="#767043" />

  <!-- Marcador de Alinhamento: Inferior Direito -->
  <rect x="110" y="110" width="20" height="20" rx="2" fill="#767043" />
  <rect x="114" y="114" width="12" height="12" rx="1" fill="#ffffff" />
  <rect x="118" y="118" width="4" height="4" fill="#767043" />

  <!-- Módulos / Pixels Aleatórios Simbolizando o QR Code -->
  <!-- Linhas horizontais e verticais quebradas -->
  <rect x="60" y="10" width="10" height="10" fill="#ff8c52" />
  <rect x="80" y="10" width="10" height="5" fill="#767043" />
  <rect x="65" y="25" width="25" height="10" fill="#767043" opacity="0.8" />
  <rect x="60" y="40" width="15" height="10" fill="#ff8c52" />
  <rect x="80" y="45" width="10" height="15" fill="#767043" />

  <rect x="10" y="60" width="15" height="15" fill="#ff8c52" />
  <rect x="35" y="65" width="15" height="10" fill="#767043" />
  <rect x="60" y="65" width="10" height="25" fill="#767043" />
  <rect x="80" y="70" width="25" height="10" fill="#767043" />
  <rect x="115" y="60" width="10" height="10" fill="#ff8c52" />
  <rect x="130" y="70" width="10" height="15" fill="#767043" />

  <rect x="10" y="85" width="20" height="10" fill="#767043" />
  <rect x="40" y="80" width="10" height="15" fill="#ff8c52" />
  <rect x="95" y="85" width="15" height="15" fill="#767043" />
  <rect x="120" y="90" width="20" height="10" fill="#767043" />

  <rect x="60" y="100" width="20" height="10" fill="#767043" />
  <rect x="85" y="110" width="15" height="15" fill="#ff8c52" />
  <rect x="65" y="120" width="10" height="20" fill="#767043" />
  <rect x="80" y="130" width="25" height="10" fill="#767043" />
  
  <rect x="130" y="130" width="10" height="10" fill="#ff8c52" />
</svg>
