<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5c4735;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a3829;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b2017;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sunlight" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#ffe066;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#4a3829;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Fundo do Gradiente principal -->
  <rect width="1920" height="1080" fill="url(#heroGrad)" />
  <!-- Efeito de iluminação suave -->
  <circle cx="960" cy="450" r="800" fill="url(#sunlight)" />

  <!-- Formas geométricas abstratas elegantes no fundo -->
  <circle cx="1600" cy="200" r="300" fill="#c3af9b" opacity="0.1" />
  <circle cx="200" cy="900" r="400" fill="#c3af9b" opacity="0.08" />

  <!-- Ilustração vetorial moderna do rosto de um cão no centro do Hero -->
  <g transform="translate(760, 200)" scale="1.3">
    <!-- Orelhas -->
    <path d="M40,100 Q10,40 80,60" fill="#c3af9b" opacity="0.8" />
    <path d="M40,100 C15,40 65,15 80,50" fill="#767043" />
    
    <path d="M260,100 Q290,40 220,60" fill="#c3af9b" opacity="0.8" />
    <path d="M260,100 C285,40 235,15 220,50" fill="#767043" />
    
    <!-- Cabeça principal -->
    <ellipse cx="150" cy="150" rx="110" ry="95" fill="#b5967a" />
    <!-- Marca branca na testa -->
    <path d="M135,55 L165,55 L160,140 L140,140 Z" fill="#faf8f5" opacity="0.9" />

    <!-- Olhos -->
    <circle cx="105" cy="120" r="14" fill="#2b2724" />
    <circle cx="195" cy="120" r="14" fill="#2b2724" />
    <!-- Brilhos dos olhos -->
    <circle cx="109" cy="115" r="5" fill="#ffffff" />
    <circle cx="103" cy="123" r="2" fill="#ffffff" />
    <circle cx="199" cy="115" r="5" fill="#ffffff" />
    <circle cx="193" cy="123" r="2" fill="#ffffff" />
    
    <!-- Sobrancelhas suaves -->
    <ellipse cx="105" cy="95" rx="16" ry="6" fill="#767043" opacity="0.6" />
    <ellipse cx="195" cy="95" rx="16" ry="6" fill="#767043" opacity="0.6" />

    <!-- Focinho -->
    <path d="M90,160 Q150,110 210,160 Q150,225 90,160 Z" fill="#faf8f5" />
    
    <!-- Nariz -->
    <path d="M130,160 Q150,145 170,160 Q150,185 130,160 Z" fill="#2b2724" />
    <!-- Brilho no nariz -->
    <ellipse cx="145" cy="154" rx="4" ry="2" fill="#ffffff" />

    <!-- Sorriso sutil / boca -->
    <path d="M140,180 Q150,190 160,180" fill="none" stroke="#2b2724" stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Caixa de instruções de placeholder centralizada no topo -->
  <g transform="translate(660, 720)">
    <rect width="600" height="120" rx="20" fill="#ffffff" opacity="0.15" stroke="#ffffff" stroke-width="1.5" />
    <rect width="600" height="120" rx="20" fill="none" stroke="#ffffff" stroke-dasharray="8,8" stroke-width="2" />
    <text x="300" y="50" font-family="'Montserrat', sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">IMAGEM DE DESTAQUE DO TOPO</text>
    <text x="300" y="85" font-family="'Plus Jakarta Sans', sans-serif" font-size="16" font-weight="500" fill="#ffe7d1" text-anchor="middle">Substitua por seu arquivo: assets/images/hero-bg.jpg</text>
  </g>
</svg>
