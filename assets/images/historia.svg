<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="100%" height="100%">
  <!-- Fundo com gradiente suave -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#efe7dd;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcd1c4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#2b2724" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Retângulo principal do fundo -->
  <rect width="400" height="420" rx="24" fill="url(#grad)" />

  <!-- Círculo decorativo de fundo -->
  <circle cx="200" cy="180" r="100" fill="#c3af9b" opacity="0.3" />

  <!-- Ilustração vetorial moderna de um Cachorrinho -->
  <g transform="translate(140, 110)">
    <!-- Orelhas -->
    <path d="M15,40 C10,15 35,5 45,25" fill="#767043" />
    <path d="M105,40 C110,15 85,5 75,25" fill="#767043" />
    
    <!-- Cabeça/Rosto -->
    <ellipse cx="60" cy="60" rx="45" ry="40" fill="#b5967a" />
    
    <!-- Focinho -->
    <path d="M35,65 Q60,45 85,65 Q60,95 35,65 Z" fill="#faf8f5" />
    <path d="M52,65 Q60,57 68,65 Q60,77 52,65 Z" fill="#2b2724" />
    
    <!-- Olhos -->
    <circle cx="42" cy="48" r="6" fill="#2b2724" />
    <circle cx="78" cy="48" r="6" fill="#2b2724" />
    <!-- Brilho dos olhos -->
    <circle cx="44" cy="46" r="2" fill="#ffffff" />
    <circle cx="80" cy="46" r="2" fill="#ffffff" />
    
    <!-- Coleira -->
    <path d="M30,95 Q60,105 90,95" fill="none" stroke="#ff8c52" stroke-width="8" stroke-linecap="round" />
    <circle cx="60" cy="103" r="7" fill="#ffe066" />
  </g>

  <!-- Grupo de Texto -->
  <g transform="translate(20, 310)">
    <rect width="360" height="80" rx="16" fill="#faf8f5" filter="url(#shadow)" />
    <text x="180" y="35" font-family="'Montserrat', sans-serif" font-size="16" font-weight="bold" fill="#2b2724" text-anchor="middle">SUA FOTO AQUI</text>
    <text x="180" y="58" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#5e5751" text-anchor="middle">Substitua por: assets/images/historia.jpg</text>
  </g>
</svg>
