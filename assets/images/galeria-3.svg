<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="100%" height="100%">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf8f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#efe7dd;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#2b2724" flood-opacity="0.08" />
    </filter>
  </defs>

  <rect width="300" height="400" rx="16" fill="url(#grad3)" />
  
  <!-- Círculos concêntricos decorativos -->
  <circle cx="150" cy="160" r="80" fill="none" stroke="#c3af9b" stroke-width="2" opacity="0.3" stroke-dasharray="8,8" />
  <circle cx="150" cy="160" r="60" fill="#c3af9b" opacity="0.15" />

  <!-- Ilustração de potes de ração múltiplos -->
  <g transform="translate(75, 100)">
    <!-- Pote 1 (atrás) -->
    <path d="M10,60 L90,60 L80,90 L20,90 Z" fill="#b5967a" opacity="0.5" />
    <ellipse cx="50" cy="60" rx="40" ry="8" fill="#a48466" opacity="0.5" />
    
    <!-- Pote 2 (atrás/lado) -->
    <path d="M60,40 L140,40 L130,70 L70,70 Z" fill="#767043" opacity="0.5" />
    <ellipse cx="100" cy="40" rx="40" ry="8" fill="#5c5735" opacity="0.5" />

    <!-- Pote Principal (Frente) -->
    <path d="M20,70 L130,70 L115,110 L35,110 Z" fill="#ff8c52" />
    <ellipse cx="75" cy="70" rx="55" ry="10" fill="#e0733d" />
    
    <!-- Símbolo de coração no pote principal -->
    <path d="M75,98 C75,98 71,94 67,90 C63,86 63,82 67,78 C71,74 75,78 75,78 C75,78 79,74 83,78 C87,82 87,86 83,90 C79,94 75,98 75,98 Z" fill="#faf8f5" />
  </g>

  <!-- Grupo de Texto explicativo -->
  <g transform="translate(15, 290)">
    <rect width="270" height="90" rx="12" fill="#ffffff" filter="url(#shadow)" />
    <text x="135" y="32" font-family="'Montserrat', sans-serif" font-size="14" font-weight="bold" fill="#2b2724" text-anchor="middle">FOTO DA GALERIA 3</text>
    <text x="135" y="52" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" fill="#767043" font-weight="600" text-anchor="middle">Preparo dos Potes</text>
    <text x="135" y="70" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" fill="#5e5751" text-anchor="middle">Substitua por: assets/images/galeria-3.jpg</text>
  </g>
</svg>
