<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf8f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#efe7dd;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#2b2724" flood-opacity="0.08" />
    </filter>
  </defs>

  <rect width="300" height="400" rx="16" fill="url(#grad1)" />
  
  <!-- Círculos concêntricos decorativos -->
  <circle cx="150" cy="160" r="80" fill="none" stroke="#c3af9b" stroke-width="2" opacity="0.3" stroke-dasharray="8,8" />
  <circle cx="150" cy="160" r="60" fill="#c3af9b" opacity="0.15" />

  <!-- Tigela de ração vetorial -->
  <g transform="translate(90, 110)">
    <!-- Comida empilhada -->
    <path d="M20,50 Q60,10 100,50 Z" fill="#b5967a" />
    <circle cx="45" cy="40" r="4" fill="#767043" />
    <circle cx="55" cy="35" r="4" fill="#767043" />
    <circle cx="65" cy="42" r="4" fill="#767043" />
    <circle cx="75" cy="38" r="4" fill="#767043" />
    
    <!-- Corpo da tigela -->
    <path d="M10,50 L110,50 L100,90 L20,90 Z" fill="#ff8c52" />
    <ellipse cx="60" cy="50" rx="50" ry="10" fill="#e0733d" />
    
    <!-- Detalhe da patinha na tigela -->
    <circle cx="60" cy="72" r="6" fill="#faf8f5" />
    <circle cx="48" cy="65" r="3" fill="#faf8f5" />
    <circle cx="53" cy="60" r="3" fill="#faf8f5" />
    <circle cx="67" cy="60" r="3" fill="#faf8f5" />
    <circle cx="72" cy="65" r="3" fill="#faf8f5" />
  </g>

  <!-- Grupo de Texto explicativo -->
  <g transform="translate(15, 290)">
    <rect width="270" height="90" rx="12" fill="#ffffff" filter="url(#shadow)" />
    <text x="135" y="32" font-family="'Montserrat', sans-serif" font-size="14" font-weight="bold" fill="#2b2724" text-anchor="middle">FOTO DA GALERIA 1</text>
    <text x="135" y="52" font-family="'Plus Jakarta Sans', sans-serif" font-size="11" fill="#767043" font-weight="600" text-anchor="middle">Alimentação Coletiva</text>
    <text x="135" y="70" font-family="'Plus Jakarta Sans', sans-serif" font-size="9" fill="#5e5751" text-anchor="middle">Substitua por: assets/images/galeria-1.jpg</text>
  </g>
</svg>
